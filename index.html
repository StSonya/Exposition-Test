<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- Змінено джерело на надійний сервіс Cloudflare -->
    <script src="https://cdnjs.cloudflare.com"></script>
  </head>
  <body>
    <!-- Якщо сцена запрацює, фон стане ТЕМНО-СІРИМ -->
    <a-scene background="color: #222">
      <a-box position="0 1.5 -3" rotation="0 45 0" color="#4CC3D9"
             animation="property: rotation; to: 0 405 0; loop: true; dur: 5000"></a-box>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
    </a-scene>
  </body>
</html>
