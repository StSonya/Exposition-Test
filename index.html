<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io"></script>
  </head>
  <body>
    <a-scene background="color: #111">
      <!-- ЗАВАНТАЖУЄМО МОДЕЛЬ: замість vaza.glb напишіть назву свого файлу -->
      <a-assets>
        <a-asset-item id="myModel" src="vaza.glb"></a-asset-item>
      </a-assets>

      <!-- СТАВИМО МОДЕЛЬ: position (ліво/право, висота, вперед/назад) -->
      
      

      <!-- ПІДСТАВКА (ПОСТАМЕНТ) -->
      <a-cylinder position="0 0.5 -3" radius="0.5" height="1" color="#333"></a-cylinder>

      <!-- СВІТЛО (щоб не було темно) -->
      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>

      <!-- КАМЕРА (мишка - крутити, WASD - ходити) -->
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
